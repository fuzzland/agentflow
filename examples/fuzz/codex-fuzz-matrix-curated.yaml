# Curated Codex fuzz matrix
#
# This example shows how `fanout.matrix` can stay compact even when a real
# campaign needs a few exclusions and bespoke shards. Use `exclude` to drop
# noisy or unsupported combinations, `include` to append hand-picked shards,
# and `derive` to keep workspace/label boilerplate out of the node body.
#
# Usage:
#   agentflow init fuzz-matrix-curated.yaml --template codex-fuzz-matrix-curated
#   agentflow inspect examples/fuzz/codex-fuzz-matrix-curated.yaml
#   agentflow run examples/fuzz/codex-fuzz-matrix-curated.yaml --preflight never

name: codex-fuzz-matrix-curated
description: Curated Codex fuzz matrix that prunes invalid combinations and adds bespoke shards without a sidecar catalog.
working_dir: ./codex_fuzz_matrix_curated
concurrency: 8

nodes:
  - id: init
    agent: codex
    tools: read_write
    timeout_seconds: 60
    prompt: |
      Create the following directory structure silently if it does not already exist:
        mkdir -p docs crashes
      If crashes/README.md is missing or empty, create it with:
        # Crash Registry
        | Timestamp | Label | Evidence | Artifact |
        |---|---|---|---|
      If docs/campaign_notes.md is missing or empty, create it with:
        # Campaign Notes
        Use this file only for cross-shard lessons and retargeting guidance.
      Then respond with exactly: INIT_OK

    success_criteria:
      - kind: output_contains
        value: INIT_OK

  - id: fuzzer
    fanout:
      as: shard
      matrix:
        family:
          - target: libpng
            corpus: png
          - target: sqlite
            corpus: sql
        strategy:
          - sanitizer: asan
            focus: parser
          - sanitizer: asan
            focus: structure-aware
          - sanitizer: ubsan
            focus: stateful
        seed_bucket:
          - bucket: seed_a
            seed: 5101
          - bucket: seed_b
            seed: 5102
          - bucket: seed_c
            seed: 5103
      exclude:
        - target: sqlite
          focus: structure-aware
        - family:
            target: libpng
          seed_bucket:
            bucket: seed_c
      include:
        - family:
            target: openssl
            corpus: tls
          strategy:
            sanitizer: asan
            focus: handshake
          seed_bucket:
            bucket: seed_tls_a
            seed: 9901
        - family:
            target: openssl
            corpus: tls
          strategy:
            sanitizer: asan
            focus: handshake
          seed_bucket:
            bucket: seed_tls_b
            seed: 9902
      derive:
        label: "{{ shard.target }} / {{ shard.sanitizer }} / {{ shard.focus }} / {{ shard.bucket }}"
        workspace: "agents/{{ shard.target }}_{{ shard.sanitizer }}_{{ shard.bucket }}_{{ shard.suffix }}"
    agent: codex
    model: gpt-5-codex
    tools: read_write
    depends_on: [init]
    target:
      kind: local
      cwd: "{{ shard.workspace }}"
    timeout_seconds: 1800
    retries: 1
    retry_backoff_seconds: 2
    extra_args:
      - "--search"
    prompt: |
      You are Codex fuzz shard {{ shard.number }} of {{ shard.count }} in an authorized campaign.

      Campaign inputs:
      - Label: {{ shard.label }}
      - Target: {{ shard.target }}
      - Corpus family: {{ shard.corpus }}
      - Sanitizer: {{ shard.sanitizer }}
      - Strategy focus: {{ shard.focus }}
      - Seed bucket: {{ shard.bucket }}
      - Seed: {{ shard.seed }}
      - Workspace: {{ shard.workspace }}

      Campaign tuning:
      - Base matrix coverage handles common libpng/sqlite parser and stateful passes.
      - `fanout.exclude` removes the noisy `sqlite/asan/structure-aware` combinations and the weak libpng `seed_c` bucket.
      - `fanout.include` adds two bespoke OpenSSL/TLS handshake shards without forcing the whole campaign into a catalog file.

      Shard contract:
      - Stay within {{ shard.workspace }} unless you are appending to the shared crash registry or notes.
      - Use the label, target family, sanitizer, focus, and seed bucket to keep the campaign reproducible.
      - Prefer high-signal crashers, assertion failures, memory safety bugs, or logic corruptions.
      - Record confirmed findings in `crashes/README.md` and copy minimal repro artifacts into `crashes/`.
      - Add short cross-shard lessons to `docs/campaign_notes.md` when they help other shards avoid duplicate work.

  - id: merge
    agent: codex
    model: gpt-5-codex
    tools: read_only
    depends_on: [fuzzer]
    timeout_seconds: 300
    prompt: |
      Consolidate this curated fuzz matrix into a maintainer handoff.
      Start with strong or confirmed issues, then call out gaps created by excluded combinations, and end with whether the bespoke TLS shards earned a place in the default matrix.

      {% for shard in fanouts.fuzzer.nodes %}
      ### {{ shard.label }} :: {{ shard.id }} (status: {{ shard.status }})
      {{ shard.output or "(no output)" }}

      {% endfor %}
